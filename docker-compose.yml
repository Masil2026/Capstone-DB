version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: reactive-postgres-vector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: masil1234
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - reactive-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: reactive-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - reactive-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  reactive-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
